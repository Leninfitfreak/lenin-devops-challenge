name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest ruff

      - name: Lint Python
        run: ruff check app

      - name: Run tests
        run: PYTHONPATH=. pytest app/tests

      - name: Scan repository
        run: docker run --rm -v "$PWD:/work" aquasec/trivy:0.58.2 fs --scanners vuln,secret --severity HIGH,CRITICAL --exit-code 1 /work

      - name: Build Docker image
        run: docker build -t skybyte/app:ci .

      - uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/skybyte-app

      - name: Render Helm chart
        run: helm template skybyte-app helm/skybyte-app > rendered.yaml

      - name: Validate Kubernetes manifests
        run: docker run --rm -v "$PWD:/work" ghcr.io/yannh/kubeconform:v0.6.7 -strict -summary /work/rendered.yaml

      - uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        working-directory: terraform
        run: terraform fmt -check

      - name: Initialize Terraform
        working-directory: terraform
        run: terraform init -backend=false

      - name: Validate Terraform
        working-directory: terraform
        run: terraform validate
